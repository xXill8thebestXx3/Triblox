<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Triblox Studio Fixed ResizeObserver</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}
#studio-container {
    display: grid;
    grid-template-columns: 150px 1fr 250px;
    grid-template-rows: 50px 1fr 80px;
    grid-template-areas:
        "topbar topbar topbar"
        "toolbar canvas rightpanels"
        "output output output";
    height: 100%;
    width: 100%;
}
#topbar { grid-area: topbar; background: #232323; color: white; display: flex; align-items: center; padding: 0 10px; gap: 5px; }
#topbar button.selected { background: #777; }
#toolbar { grid-area: toolbar; background: #333; display: flex; flex-direction: column; padding: 10px; gap: 10px; color: white; position: relative; }
#rightpanels { grid-area: rightpanels; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #eee; position: relative; }
#object-explorer, #properties-editor, #toolbar, #output { border: 1px solid #aaa; background: #ddd; padding: 5px; overflow-y: auto; position: relative; }
.close-btn { position: absolute; top: 2px; right: 5px; cursor: pointer; font-weight: bold; }
#output { grid-area: output; background: #1e1e1e; color: #0f0; font-family: monospace; padding: 2px; font-size: 12px; overflow-y: auto; }
#canvas-container { grid-area: canvas; position: relative; background: #aaa; }
canvas { display: block; width: 100%; height: 100%; }
button { padding: 5px; background: #555; color: white; border: none; cursor: pointer; }
button:hover { background: #777; }
</style>
</head>
<body>

<div id="studio-container">
    <div id="topbar">
        <button data-panel="toolbar" class="selected">Toolbar</button>
        <button data-panel="rightpanels" class="selected">Right Panel</button>
        <button data-panel="output" class="selected">Output</button>
        <button data-panel="extra">Extra</button>
    </div>

    <div id="toolbar">
        <span class="close-btn">×</span>
        <button id="add-cube">Cube</button>
        <button id="add-sphere">Sphere</button>
    </div>

    <div id="canvas-container">
        <canvas id="sandbox"></canvas>
    </div>

    <div id="rightpanels">
        <span class="close-btn">×</span>
        <div id="object-explorer">Object Explorer</div>
        <div id="properties-editor">Properties Editor</div>
    </div>

    <div id="output">Output Console:</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ----------------- 3D Setup -----------------
const canvas = document.getElementById('sandbox');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f2f2);
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
camera.position.set(0,5,10);
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.GridHelper(50,50));
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dirLight = new THREE.DirectionalLight(0xffffff,0.8);
dirLight.position.set(10,10,10);
scene.add(dirLight);

const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshStandardMaterial({color:0x00a2ff});
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false;
let velocity = new THREE.Vector3();
document.addEventListener('keydown', e=>{
    if(e.code==='KeyW') moveForward=true;
    if(e.code==='KeyS') moveBackward=true;
    if(e.code==='KeyA') moveLeft=true;
    if(e.code==='KeyD') moveRight=true;
});
document.addEventListener('keyup', e=>{
    if(e.code==='KeyW') moveForward=false;
    if(e.code==='KeyS') moveBackward=false;
    if(e.code==='KeyA') moveLeft=false;
    if(e.code==='KeyD') moveRight=false;
});

function animate(){
    requestAnimationFrame(animate);
    velocity.set(0,0,0);
    if(moveForward) velocity.z-=0.1;
    if(moveBackward) velocity.z+=0.1;
    if(moveLeft) velocity.x-=0.1;
    if(moveRight) velocity.x+=0.1;
    camera.position.add(velocity);
    controls.update();
    renderer.render(scene,camera);
}
animate();

// ----------------- Panels Toggle -----------------
const buttons = document.querySelectorAll('#topbar button');
buttons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
        const panel = document.getElementById(btn.dataset.panel);
        if(!panel) return;
        const visible = panel.style.display !== 'none';
        panel.style.display = visible ? 'none':'block';
        btn.classList.toggle('selected', !visible);
    });
});

// Close buttons
document.querySelectorAll('.close-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
        const parent = e.target.parentElement;
        parent.style.display='none';
        const panelBtn = [...buttons].find(b=>b.dataset.panel===parent.id);
        if(panelBtn) panelBtn.classList.remove('selected');
    });
});

// ----------------- ResizeObserver Fix -----------------
const container = document.getElementById('canvas-container');
function resizeCanvas(){
    const width = container.clientWidth;
    const height = container.clientHeight;
    if(width===0 || height===0) return;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
}
// Observe container changes (panels toggle, window resize, etc.)
const ro = new ResizeObserver(resizeCanvas);
ro.observe(container);
window.addEventListener('load', resizeCanvas);

// ----------------- Toolbar Buttons -----------------
document.getElementById('add-cube').addEventListener('click', ()=>{
    const geo = new THREE.BoxGeometry();
    const mat = new THREE.MeshStandardMaterial({color:0x00a2ff});
    const c = new THREE.Mesh(geo, mat);
    c.position.set(Math.random()*5,0.5,Math.random()*5);
    scene.add(c);
});
document.getElementById('add-sphere').addEventListener('click', ()=>{
    const geo = new THREE.SphereGeometry(0.5,32,32);
    const mat = new THREE.MeshStandardMaterial({color:0xffaa00});
    const s = new THREE.Mesh(geo, mat);
    s.position.set(Math.random()*5,0.5,Math.random()*5);
    scene.add(s);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Triblox</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: url('https://www.reddit.com/r/roblox/comments/o01og0/the_full_roblox_signup_page_image_2017/') no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.35);
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background-color: rgba(44,44,44,0.9);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 10;
    }

    .navbar .logo {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-decoration: none;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    .navbar ul li {
      margin-left: 20px;
    }

    .navbar ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    .navbar ul li a:hover {
      text-decoration: underline;
    }

    /* Signup container */
    .signup-container {
      max-width: 400px;
      margin: 120px auto 60px auto;
      background-color: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      text-align: center;
    }

    .signup-container h2 {
      margin-bottom: 20px;
    }

    .signup-container label {
      display: block;
      margin: 10px 0 5px 0;
      font-weight: 500;
      text-align: left;
    }

    .signup-container input,
    .signup-container select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .signup-container input:focus,
    .signup-container select:focus {
      border-color: #17a2b8;
      outline: none;
    }

    /* Gender icons style */
    .gender-container {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .gender-option {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 14px;
    }

    .gender-option img {
      width: 30px;
      height: 30px;
      margin-bottom: 5px;
    }

    .gender-option.selected {
      border-color: #17a2b8;
      background-color: #e0f7fa;
    }

    .signup-container button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #17a2b8;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      transition: background 0.2s;
    }

    .signup-container button:hover {
      background-color: #138496;
    }

    .signup-container .terms {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }

    .signup-container .terms a {
      color: #17a2b8;
      text-decoration: none;
    }

    .signup-container .terms a:hover {
      text-decoration: underline;
    }

    /* Age verification popup */
    .age-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }

    .age-popup .popup-content {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      max-width: 350px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .age-popup button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .age-popup button#ageYes {
      background-color: #17a2b8;
      color: #fff;
      margin-right: 10px;
    }

    .age-popup button#ageYes:hover {
      background-color: #138496;
    }

    .age-popup button#ageNo {
      background-color: #ccc;
      color: #333;
    }

    .age-popup button#ageNo:hover {
      background-color: #aaa;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="#" class="logo">Triblox</a>
    <ul>
      <li><a href="#">Games</a></li>
      <li><a href="#">Catalog</a></li>
      <li><a href="#">Robux</a></li>
      <li><a href="#">Create</a></li>
      <li><a href="#">Login</a></li>
      <li><a href="#">Sign Up</a></li>
    </ul>
  </nav>

  <!-- Signup Form -->
  <div class="signup-container">
    <h2>Create Your Account</h2>
    <form id="signupForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>

      <label for="birthdate">Birthdate</label>
      <input type="date" id="birthdate" name="birthdate" required>

      <label>Gender</label>
      <div class="gender-container">
        <div class="gender-option" data-value="male">
          <img src="https://i.imgur.com/6Y2eKjF.png" alt="Male Icon">
          Male
        </div>
        <div class="gender-option" data-value="female">
          <img src="https://i.imgur.com/r3Hn1cH.png" alt="Female Icon">
          Female
        </div>
        <div class="gender-option" data-value="other">
          <img src="https://i.imgur.com/7b0WqM7.png" alt="Other Icon">
          Other
        </div>
      </div>
      <input type="hidden" id="gender" name="gender">

      <button type="submit">Sign Up</button>

      <p class="terms">By signing up, you agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.</p>
    </form>
  </div>

  <!-- Age Verification Popup -->
  <div class="age-popup" id="agePopup">
    <div class="popup-content">
      <h3>Are you 5 or older?</h3>
      <p>Triblox requires users to be at least 5 years old to sign up.</p>
      <button id="ageYes">Yes</button>
      <button id="ageNo">No</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const agePopup = document.getElementById('agePopup');
    const ageYes = document.getElementById('ageYes');
    const ageNo = document.getElementById('ageNo');

    const genderOptions = document.querySelectorAll('.gender-option');
    const genderInput = document.getElementById('gender');

    // Gender selection
    genderOptions.forEach(option => {
      option.addEventListener('click', () => {
        genderOptions.forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        genderInput.value = option.getAttribute('data-value');
      });
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const password = form.password.value;
      const confirmPassword = form['confirm-password'].value;

      if(password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      // Show age verification popup
      agePopup.style.display = 'flex';
    });

    ageYes.addEventListener('click', () => {
      agePopup.style.display = 'none';
      alert(`Account created for ${form.username.value}!`);
      form.reset();
      genderOptions.forEach(o => o.classList.remove('selected'));
    });

    ageNo.addEventListener('click', () => {
      agePopup.style.display = 'none';
      alert("Sorry, you must be at least 5 to sign up.");
    });
  </script>

</body>
</html>
